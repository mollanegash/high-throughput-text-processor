
# Render dynamic port binding
server.port=${PORT:8080}

# PostgreSQL datasource configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/regulationsdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator / health endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Spring AI / OpenAI configuration
spring.ai.provider=openai
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.chat.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.chat.model=${SPRING_AI_OPENAI_CHAT_MODEL:gpt-4o-mini}

# Logging for AI startup diagnostics
logging.level.org.springframework.ai=INFO
