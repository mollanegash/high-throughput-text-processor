# PostgreSQL connection for AI-enabled regulatory analysis
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:regulatordb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring AI / pgvector configuration
# TODO: adjust property names if your Spring AI version uses a different namespace.
spring.ai.provider=openai
spring.ai.pgvector.enabled=true
spring.ai.pgvector.index-type=hnsw
spring.ai.pgvector.distance-metric=cosine
spring.ai.pgvector.vector-column=embedding_vector
spring.ai.pgvector.table-name=regulatory_insight
# OpenAI API Key Configuration
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
